name: examiq_app
description: ExamIQ — AI-powered exam integrity platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # Camera
  camera: ^0.11.0+2

  # HTTP calls to Python backend
  http: ^1.2.2
  dio: ^5.7.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.2.0

  # Local storage
  shared_preferences: ^2.3.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_spinkit: ^5.2.1
  fl_chart: ^0.69.0

  # CSV export
  csv: ^6.0.0
  path_provider: ^2.1.4
  share_plus: ^10.1.2

  # Audio monitoring
  record: ^5.0.0

  # Permissions
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  dotenv: ^4.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
